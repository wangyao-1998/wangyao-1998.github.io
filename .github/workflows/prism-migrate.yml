name: One-time PRISM migration
# trigger: 2026-06-23-1

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/prism-migrate.yml
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  migrate:
    name: Replace repository with PRISM source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unpack migration payload
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/prism-payload"
          cat > "$RUNNER_TEMP/prism-payload.tgz.b64" <<'PAYLOAD'

PAYLOAD
          base64 -d "$RUNNER_TEMP/prism-payload.tgz.b64" > "$RUNNER_TEMP/prism-payload.tgz"
          tar -xzf "$RUNNER_TEMP/prism-payload.tgz" -C "$RUNNER_TEMP/prism-payload"
          mkdir -p "$RUNNER_TEMP/prism-payload/overrides/public"
          if [ -f photos/small1.jpg ]; then
            cp photos/small1.jpg "$RUNNER_TEMP/prism-payload/overrides/public/bio.jpg"
          fi

      - name: Assemble final PRISM site
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/xyjoey/PRISM.git "$RUNNER_TEMP/PRISM"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch .
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          rsync -a --exclude='.git' "$RUNNER_TEMP/PRISM/" ./
          rm -rf content content_zh docs README_cn.md logo.png screenshot.png public/papers package-lock.json
          cp -R "$RUNNER_TEMP/prism-payload/content" ./content
          cp -R "$RUNNER_TEMP/prism-payload/overrides/." ./
          git add .
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No PRISM migration changes to commit."
          else
            git commit -m "Replace static homepage with PRISM academic site"
            git push
          fi

      - name: Trigger deployment workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sleep 10
          gh workflow run deploy.yml --ref main || true
